general:
  push_to_talk_key: "right ctrl"

stt: #~1,1гб VRAM
  model: "large-v3-turbo"
  device: "cuda"
  compute_type: "int8_bfloat16"
  language: "ru"

tts: #~2,4гб VRAM
  mode: "speed" # "quality" - Qwen3 или "speed" - Silero v5

  speed:
    silero_speaker: "baya"
    sample_rate: 24000
    language: "ru"
    speaker_type: "v5_ru"
    device: "cuda"
    speaker_name: "baya"
  
  quality:
    model: "Qwen/Qwen3-TTS-12Hz-0.6B-Base"
    attn_implementation: "sdpa"
    max_seq_len: 2048
    ref_voice: "voices/example.wav"
    ref_text: ""
    language: "Russian"
    chunk_size: 4

llm: #~0гб VRAM
  current_model: "gemini"
  history_len: 4
  prompt_mode: "humor" # humor or smart
  
  gemini:
    model: "gemma-4-26b-a4b-it"
    temperature: 1.0
    max_output_tokens: 4000
  
  ollama:
    host: "http://127.0.0.1:11434"
    model: "qwen3.5:0.8b"
    think: true
    temperature: 1.0
    max_output_tokens: 4000